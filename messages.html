<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CorpConnect — Messages</title>
<link rel="stylesheet" href="style.css"/>
<style>
.msg-shell{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 57px);}
.contact-pane{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.contact-hd{padding:14px 16px;border-bottom:1px solid var(--border);font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;display:flex;align-items:center;justify-content:space-between;}
.contact-search{padding:10px 12px;border-bottom:1px solid var(--border);}
.contact-search input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-size:.8rem;}
.contact-search input:focus{outline:none;border-color:var(--gold);}
.contact-list{flex:1;overflow-y:auto;}
.contact-item{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;border-bottom:1px solid rgba(30,45,74,.4);transition:background .15s;}
.contact-item:hover,.contact-item.active{background:var(--bg3);}
.contact-name{font-weight:600;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.contact-preview{font-size:.75rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px;}
.unread-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0;}
.thread-pane{display:flex;flex-direction:column;height:100%;}
.thread-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--bg2);}
.thread-hd-name{font-weight:700;}
.thread-hd-role{font-size:.75rem;color:var(--text2);}
.thread-body{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;}
.bubble{max-width:65%;padding:10px 14px;border-radius:12px;font-size:.875rem;line-height:1.55;}
.bubble.me{align-self:flex-end;background:var(--gold-dim);border:1px solid rgba(201,168,76,.2);}
.bubble.them{align-self:flex-start;background:var(--bg3);border:1px solid var(--border);}
.bubble-meta{font-size:.7rem;color:var(--text3);margin-top:3px;}
.bubble.me .bubble-meta{text-align:right;}
.thread-input{padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:10px;background:var(--bg2);}
.thread-input input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;color:var(--text);font-size:.875rem;}
.thread-input input:focus{outline:none;border-color:var(--gold);}
.empty-thread{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);gap:10px;}

<!-- New Message Modal -->
</style>
</head>
<body>
<div id="toast-container" class="toast-container"></div>
<div class="app-shell">
  <div id="sidebar"></div>
  <div class="main-area" style="overflow:hidden">
    <div class="topbar">
      <div class="topbar-title">Messages</div>
      <div class="topbar-actions">
        <button class="btn btn-gold btn-sm" onclick="openNewMsg()">+ New Message</button>
      </div>
    </div>
    <div class="msg-shell">
      <!-- Contact List -->
      <div class="contact-pane">
        <div class="contact-hd">
          Conversations
          <span id="msg-count" class="badge badge-gold"></span>
        </div>
        <div class="contact-search">
          <input id="contact-search" placeholder="Search contacts…" oninput="renderContacts()"/>
        </div>
        <div class="contact-list" id="contact-list"></div>
      </div>
      <!-- Thread -->
      <div class="thread-pane" id="thread-pane">
        <div class="empty-thread">
          <div style="font-size:2rem;opacity:.3">💬</div>
          <div>Select a conversation or start a new one</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- New Message Modal -->
<div class="modal-backdrop" id="modal-new">
  <div class="modal" style="max-width:420px">
    <div class="modal-hd"><span class="modal-title">New Message</span><button class="modal-close" onclick="closeNewMsg()">✕</button></div>
    <div class="field"><label>To</label>
      <select id="new-to"></select>
    </div>
    <div class="field"><label>Message</label>
      <textarea id="new-content" rows="4" placeholder="Write your message…"></textarea>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeNewMsg()">Cancel</button>
      <button class="btn btn-gold" onclick="sendNew()">Send</button>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
const s   = requireAuth();
let activeContact = null;

if (s) {
  renderSidebar('messages.html');
  renderContacts();
  // auto-open if ?to= param
  const toId = param('to') ? +param('to') : null;
  if (toId) openThread(toId);
}

function getContacts() {
  const msgs = DB.messages.filter(m=>m.sender_id===s.id||m.receiver_id===s.id);
  const seen = new Set();
  const contacts = [];
  msgs.slice().reverse().forEach(m=>{
    const other = m.sender_id===s.id ? m.receiver_id : m.sender_id;
    if (!seen.has(other)) { seen.add(other); contacts.push({uid:other, lastMsg:m}); }
  });
  return contacts;
}

function renderContacts() {
  const q = (document.getElementById('contact-search')?.value||'').toLowerCase();
  let contacts = getContacts();
  if (q) contacts = contacts.filter(c=>userById(c.uid).name.toLowerCase().includes(q));
  document.getElementById('msg-count').textContent = contacts.length;
  document.getElementById('contact-list').innerHTML = contacts.length
    ? contacts.map(c=>{
        const u    = userById(c.uid);
        const prof = profileOf(c.uid);
        const unread = DB.messages.filter(m=>m.sender_id===c.uid&&m.receiver_id===s.id).length; // simplified
        return `<div class="contact-item ${activeContact===c.uid?'active':''}" onclick="openThread(${c.uid})">
          ${avatarHtml(u.name, 36)}
          <div style="flex:1;min-width:0">
            <div class="contact-name">${u.name}</div>
            <div class="contact-preview">${c.lastMsg.content}</div>
          </div>
          ${activeContact!==c.uid?'<div class="unread-dot" style="opacity:.4"></div>':''}
        </div>`;
      }).join('')
    : `<div class="empty" style="padding:32px 16px"><div class="empty-icon">💬</div><div class="fs-sm">No conversations yet.</div></div>`;
}

function openThread(uid) {
  activeContact = uid;
  renderContacts();
  const u    = userById(uid);
  const prof = profileOf(uid);
  const msgs = DB.messages.filter(m=>
    (m.sender_id===s.id && m.receiver_id===uid) ||
    (m.sender_id===uid  && m.receiver_id===s.id)
  );

  document.getElementById('thread-pane').innerHTML = `
    <div class="thread-hd">
      ${avatarHtml(u.name, 36)}
      <div>
        <div class="thread-hd-name">${u.name}</div>
        <div class="thread-hd-role">${prof.job_title||''} · <span class="role-pill ${u.role}">${u.role}</span></div>
      </div>
      <div style="margin-left:auto;display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="location.href='profile.html?uid=${uid}'">View Profile</button>
      </div>
    </div>
    <div class="thread-body" id="thread-body">
      ${msgs.length ? msgs.map(m=>`
        <div>
          <div class="bubble ${m.sender_id===s.id?'me':'them'}">${m.content}</div>
          <div class="bubble-meta">${m.ts||''}</div>
        </div>`).join('')
        : `<div class="empty-thread" style="height:auto;padding:40px"><div style="opacity:.3;font-size:2rem">👋</div><div>Start a conversation with ${u.name}!</div></div>`}
    </div>
    <div class="thread-input">
      <input id="msg-input" placeholder="Write a message…"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"/>
      <button class="btn btn-gold" onclick="sendMsg()">Send</button>
    </div>
  `;
  // scroll to bottom
  setTimeout(()=>{ const b=document.getElementById('thread-body'); if(b) b.scrollTop=b.scrollHeight; }, 50);
}

function sendMsg() {
  const input   = document.getElementById('msg-input');
  const content = input?.value.trim();
  if (!content || !activeContact) return;
  Mutate.sendMessage(s.id, activeContact, content);
  input.value = '';
  openThread(activeContact);
  renderContacts();
}

function openNewMsg() {
  const others = DB.users.filter(u=>u.id!==s.id);
  document.getElementById('new-to').innerHTML = others.map(u=>`<option value="${u.id}">${u.name} (${u.role})</option>`).join('');
  document.getElementById('new-content').value = '';
  document.getElementById('modal-new').classList.add('open');
}
function closeNewMsg() { document.getElementById('modal-new').classList.remove('open'); }
function sendNew() {
  const to      = +document.getElementById('new-to').value;
  const content = document.getElementById('new-content').value.trim();
  if (!to || !content) return toast('Fill all fields', 'error');
  Mutate.sendMessage(s.id, to, content);
  closeNewMsg();
  toast('Message sent!');
  openThread(to);
  renderContacts();
}
</script>
</body></html>
